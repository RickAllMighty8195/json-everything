query GetSponsors {
  user(login:"gregsdennis") {
    ... on Sponsorable {
      sponsorshipsAsMaintainer(first: 100, includePrivate: false, activeOnly: true) {
        totalCount
        nodes {
          sponsorEntity {
            ... on User {
              login
              avatarUrl
              websiteUrl
            }
            ... on Organization {
              login
              avatarUrl
              websiteUrl
            }
          }
          tier {
            monthlyPriceInDollars
          }
        }
      }
    }
  }
}